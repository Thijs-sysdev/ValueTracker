name: Build & Release Electron Installer

on:
  push:
    tags:
      - 'v*'              # Triggers on version tags: v1.0.0, v1.1.0, etc.
  workflow_dispatch:      # Allow manual trigger from GitHub Actions UI

permissions:
  contents: write         # Required to create GitHub Releases

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js (standalone)
        run: npm run build

      - name: Build Electron installer & publish to GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --publish always

      - name: Upload installer artifact (backup copy)
        uses: actions/upload-artifact@v4
        with:
          name: ValueTrackerSetup
          path: dist-electron/*.exe
          retention-days: 30
