appId: com.parttracker.valuetracker
productName: ValueTracker
copyright: "Copyright © 2026 Parttracker BV"

# Output directory for built installers
directories:
  output: dist-electron

# Files to include in the packaged app
files:
  - electron/**/*
  - .next/standalone/**/*
  - .next/static/**/*
  - public/**/*
  - package.json

# Copy static Next.js assets into the standalone folder structure
extraFiles:
  - from: .next/static
    to: .next/standalone/.next/static
  - from: public
    to: .next/standalone/public

# Windows NSIS installer
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: public/logo.png

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: "ValueTracker"
  deleteAppDataOnUninstall: false
  displayLanguageSelector: false
  language: 1043

# Auto-update: publish to GitHub Releases
publish:
  provider: github
  owner: Thijs-sysdev
  repo: ValueTracker
  releaseType: release
