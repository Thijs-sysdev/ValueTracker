appId: com.parttracker.valuetracker
productName: ValueTracker
copyright: "Copyright © 2026 Parttracker BV"

# Output directory for built installers
directories:
  output: dist-electron

# Files to include in the packaged app
files:
  - electron/**/*
  - .next/standalone/**/*
  - .next/static/**/*
  - public/**/*
  - package.json

# Tell electron-builder to keep the Next.js standalone server outside the .asar archive
asarUnpack:
  - .next/standalone/**/*
  - node_modules/node-llama-cpp/**/*
  - node_modules/@node-llama-cpp/**/*

# Static assets (.next/static, public) are pre-copied into the standalone
# folder by the CI workflow before electron-builder runs, so they are
# packaged via asarUnpack alongside server.js at the correct paths.

# Windows NSIS installer
win:
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: "ValueTracker"
  deleteAppDataOnUninstall: false
  displayLanguageSelector: false
  language: 1043
  include: build/installer.nsh

# Auto-update: publish to GitHub Releases
publish:
  provider: github
  owner: Thijs-sysdev
  repo: ValueTracker
  releaseType: release
